<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyStreak by Kate</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --card-hover: #22222e;
    --accent: #7c5cfc;
    --accent-glow: rgba(124, 92, 252, 0.25);
    --green: #34d399;
    --red: #f87171;
    --orange: #fb923c;
    --yellow: #facc15;
    --text: #e8e8ed;
    --text-dim: #8888a0;
    --border: #2a2a38;
    --radius: 16px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 24px;
    background: #000000;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 12px;
    display: grid;
    place-items: center;
    font-size: 20px;
  }
  .streak-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 14px;
  }
  .streak-badge .fire { font-size: 18px; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px;
    text-align: center;
  }
  .stat-card .value {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 2px;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── SECTION TITLES ── */
  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── TOPIC CARDS ── */
  .topics-grid {
    display: grid;
    gap: 10px;
    margin-bottom: 32px;
  }
  .topic-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .topic-card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .topic-card:hover .topic-actions { opacity: 1; pointer-events: all; }
  .topic-icon {
    width: 50px; height: 50px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .topic-info { flex: 1; }
  .topic-name { font-weight: 700; font-size: 16px; margin-bottom: 3px; }
  .topic-meta { font-size: 13px; color: var(--text-dim); }
  .topic-progress-wrap {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    margin-top: 8px;
    overflow: hidden;
  }
  .topic-progress-bar {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    transition: width 0.6s ease;
  }
  .topic-arrow {
    color: var(--text-dim);
    font-size: 20px;
    flex-shrink: 0;
  }
  .topic-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .topic-action-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.15s;
  }
  .topic-action-btn:hover { border-color: var(--accent); color: var(--text); }
  .topic-action-btn.delete:hover { border-color: var(--red); color: var(--red); }

  /* ── ADD TOPIC BUTTON ── */
  .add-topic-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    border: 2px dashed var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .add-topic-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,92,252,0.05);
  }

  /* ── QUIZ SCREEN ── */
  .screen { display: none; }
  .screen.active { display: block; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 24px;
    transition: background 0.2s;
  }
  .back-btn:hover { background: var(--card-hover); }

  .quiz-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .quiz-topic-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .quiz-progress {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-top: 14px;
  }
  .quiz-dot {
    width: 32px; height: 5px;
    border-radius: 99px;
    background: var(--border);
    transition: background 0.3s;
  }
  .quiz-dot.done { background: var(--green); }
  .quiz-dot.current { background: var(--accent); }
  .quiz-dot.wrong { background: var(--red); }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 22px;
    margin-bottom: 16px;
    text-align: center;
  }
  .question-number {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .question-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
  }

  .options {
    display: grid;
    gap: 10px;
    margin-bottom: 20px;
  }
  .option-btn {
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-btn:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--card-hover);
  }
  .option-btn .letter {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    display: grid;
    place-items: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--text-dim);
  }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(52, 211, 153, 0.1);
  }
  .option-btn.correct .letter {
    background: var(--green);
    color: #000;
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(248, 113, 113, 0.1);
  }
  .option-btn.wrong .letter {
    background: var(--red);
    color: #000;
  }
  .option-btn.disabled { pointer-events: none; opacity: 0.5; }

  .explanation {
    background: rgba(124, 92, 252, 0.08);
    border: 1px solid rgba(124, 92, 252, 0.2);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: #c4b5fd;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  .next-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #6d4de8);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px var(--accent-glow);
  }

  /* ── RESULTS SCREEN ── */
  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 24px;
    text-align: center;
    margin-bottom: 24px;
  }
  .results-emoji { font-size: 64px; margin-bottom: 16px; }
  .results-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .results-sub { color: var(--text-dim); font-size: 15px; margin-bottom: 24px; }
  .results-score {
    font-size: 56px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .results-label { font-size: 14px; color: var(--text-dim); font-weight: 500; }
  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .results-stat .val { font-size: 22px; font-weight: 800; }
  .results-stat .lbl { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .action-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: transform 0.15s;
    margin-bottom: 10px;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .action-primary {
    background: linear-gradient(135deg, var(--accent), #6d4de8);
    color: #fff;
  }
  .action-secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: grid;
    place-items: center;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  /* ── FORM ELEMENTS ── */
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-textarea {
    resize: vertical;
    min-height: 80px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .color-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 10px;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); }

  .icon-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .icon-pick {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--bg);
    font-size: 20px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.15s;
  }
  .icon-pick:hover { border-color: var(--accent); }
  .icon-pick.selected { border-color: var(--accent); background: rgba(124,92,252,0.1); }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-row .action-btn { margin-bottom: 0; flex: 1; }

  .btn-danger {
    background: var(--red);
    color: #fff;
    border: none;
  }

  /* ── QUESTION MANAGER ── */
  .question-list {
    display: grid;
    gap: 8px;
    margin-bottom: 16px;
  }
  .question-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    transition: border-color 0.2s;
  }
  .question-item:hover { border-color: var(--accent); }
  .question-item-num {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .question-item-text {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .question-item-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .qi-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    display: grid;
    place-items: center;
  }
  .qi-btn:hover { border-color: var(--accent); color: var(--text); }
  .qi-btn.delete:hover { border-color: var(--red); color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate { animation: fadeUp 0.35s ease both; }
  .delay-1 { animation-delay: 0.05s; }
  .delay-2 { animation-delay: 0.1s; }
  .delay-3 { animation-delay: 0.15s; }
  .delay-4 { animation-delay: 0.2s; }

  /* ── RESPONSIVE ── */
  @media (max-width: 420px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .stat-card { padding: 12px 8px; }
    .stat-card .value { font-size: 20px; }
    .question-text { font-size: 17px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ===== HOME SCREEN ===== -->
  <div id="homeScreen" class="screen active">
    <div class="header animate">
      <div class="logo">
        <div class="logo-icon">📚</div>
        StudyStreak
      </div>
      <div class="streak-badge">
        <span class="fire">🔥</span>
        <span id="streakCount">7</span> day streak
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card animate delay-1">
        <div class="value" style="color:var(--accent)" id="statQuestions">0</div>
        <div class="label">Questions</div>
      </div>
      <div class="stat-card animate delay-2">
        <div class="value" style="color:var(--green)" id="statAccuracy">86%</div>
        <div class="label">Accuracy</div>
      </div>
      <div class="stat-card animate delay-3">
        <div class="value" style="color:var(--orange)" id="statTopics">0</div>
        <div class="label">Topics</div>
      </div>
    </div>

    <div class="section-title animate delay-2">📖 Study Topics</div>
    <div class="topics-grid" id="topicsList"></div>
    <button class="add-topic-btn" onclick="openTopicModal()">+ Add Topic</button>
  </div>

  <!-- ===== QUIZ SCREEN ===== -->
  <div id="quizScreen" class="screen">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="quiz-header">
      <div class="quiz-topic-label" id="quizTopicLabel"></div>
      <div class="question-card">
        <div class="question-number" id="questionNumber"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div class="quiz-progress" id="quizProgress"></div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>

  <!-- ===== RESULTS SCREEN ===== -->
  <div id="resultsScreen" class="screen">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="results-card animate">
      <div class="results-emoji" id="resultsEmoji"></div>
      <div class="results-title" id="resultsTitle"></div>
      <div class="results-sub" id="resultsSub"></div>
      <div class="results-score" id="resultsScore"></div>
      <div class="results-label">correct answers</div>
      <div class="results-stats">
        <div class="results-stat">
          <div class="val" id="resCorrect" style="color:var(--green)">0</div>
          <div class="lbl">Correct</div>
        </div>
        <div class="results-stat">
          <div class="val" id="resWrong" style="color:var(--red)">0</div>
          <div class="lbl">Wrong</div>
        </div>
        <div class="results-stat">
          <div class="val" id="resTime" style="color:var(--orange)">0s</div>
          <div class="lbl">Time</div>
        </div>
      </div>
    </div>
    <button class="action-btn action-primary" onclick="retryQuiz()">Try Again</button>
    <button class="action-btn action-secondary" onclick="goHome()">Back to Topics</button>
  </div>
</div>

<!-- ===== TOPIC MODAL ===== -->
<div class="modal-overlay" id="topicModal">
  <div class="modal">
    <div class="modal-title">
      <span id="topicModalTitle">Add Topic</span>
      <button class="modal-close" onclick="closeTopicModal()">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">Topic Name</label>
      <input class="form-input" id="tmName" placeholder="e.g. Chemistry" />
    </div>

    <div class="form-group">
      <label class="form-label">Icon</label>
      <div class="icon-options" id="tmIcons"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-options" id="tmColors"></div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Difficulty</label>
        <select class="form-select" id="tmDifficulty">
          <option value="Easy">Easy</option>
          <option value="Medium" selected>Medium</option>
          <option value="Hard">Hard</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Progress %</label>
        <input class="form-input" id="tmProgress" type="number" min="0" max="100" value="0" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Number of Questions</label>
      <input class="form-input" id="tmQuestionCount" type="number" min="1" max="100" value="10" />
    </div>

    <div class="btn-row">
      <button class="action-btn action-secondary" onclick="closeTopicModal()">Cancel</button>
      <button class="action-btn action-primary" id="tmSaveBtn" onclick="saveTopic()">Create</button>
    </div>
  </div>
</div>

<!-- ===== QUESTION MANAGER MODAL ===== -->
<div class="modal-overlay" id="questionModal">
  <div class="modal">
    <div class="modal-title">
      <span id="questionModalTitle">Manage Questions</span>
      <button class="modal-close" onclick="closeQuestionModal()">✕</button>
    </div>

    <div id="questionManagerContent"></div>

    <div class="btn-row" style="margin-top:12px">
      <button class="action-btn action-secondary" onclick="closeQuestionModal()">Done</button>
      <button class="action-btn action-primary" onclick="addQuestion()">+ Add Question</button>

// ── ICON & COLOR RENDERING ──
function renderIconPalette(selected) {

    `<div class="color-swatch${c === selected ? ' selected' : ''}" style="background:${c}" onclick="pickColor('${c}', this)"></div>`

let selectedColor = '#7c5cfc';

  selectedIcon = icon;
  document.querySelectorAll('.icon-pick').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}
function pickColor(color, el) {
  selectedColor = color;
  document.querySelectorAll('.color-swatch').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

// ── RENDER TOPICS ──
function renderTopics() {
  const list = document.getElementById('topicsList');
  list.innerHTML = topics.map((t, i) => `
    <div class="topic-card animate delay-${i % 4 + 1}" onclick="startQuiz('${t.id}')">
      <div class="topic-actions">
        <button class="topic-action-btn" onclick="event.stopPropagation(); openTopicModal('${t.id}')" title="Edit">✎</button>
        <button class="topic-action-btn" onclick="event.stopPropagation(); openQuestionModal('${t.id}')" title="Questions">☰</button>
        <button class="topic-action-btn delete" onclick="event.stopPropagation(); confirmDeleteTopic('${t.id}')" title="Delete">✕</button>
      </div>
      <div class="topic-icon" style="background:${t.color}22">${t.icon}</div>
      <div class="topic-info">

        <div class="topic-meta">${t.quiz.length} questions · ${t.difficulty}</div>

        </div>
      </div>
      <div class="topic-arrow">›</div>
    </div>
  `).join('');
  updateStats();
}

function updateStats() {
  let totalQ = 0;
  topics.forEach(t => totalQ += t.quiz.length);
  document.getElementById('statQuestions').textContent = totalQ;
  document.getElementById('statTopics').textContent = topics.length;
}

// ── SCREEN MANAGEMENT ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goHome() { showScreen('homeScreen'); }

// ── QUIZ LOGIC ──
function startQuiz(topicId) {
  currentTopic = topics.find(t => t.id === topicId);
  if (!currentTopic || currentTopic.quiz.length === 0) return;
  currentQ = 0; score = 0; answered = false;
  startTime = Date.now();
  quizResults = new Array(currentTopic.quiz.length).fill(null);
  document.getElementById('quizTopicLabel').textContent = currentTopic.icon + ' ' + currentTopic.name;
  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  const quiz = currentTopic.quiz;
  const q = quiz[currentQ];
  answered = false;
  document.getElementById('questionNumber').textContent = `Question ${currentQ + 1} of ${quiz.length}`;
  document.getElementById('questionText').textContent = q.q;
  const prog = document.getElementById('quizProgress');
  prog.innerHTML = quiz.map((_, i) => {
    let cls = 'quiz-dot';
    if (i < currentQ) cls += quizResults[i] ? ' done' : ' wrong';
    else if (i === currentQ) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  const letters = ['A', 'B', 'C', 'D'];
  document.getElementById('optionsContainer').innerHTML = q.opts.map((opt, i) => `
    <button class="option-btn" onclick="selectAnswer(${i})">
      <span class="letter">${letters[i]}</span>${opt}
    </button>
  `).join('');
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = currentTopic.quiz[currentQ];
  const correct = idx === q.answer;
  if (correct) score++;
  quizResults[currentQ] = correct;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
    else btn.classList.add('disabled');
  });
  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Incorrect'}</strong> ${q.explain}`;
  exp.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('nextBtn').textContent = currentQ < currentTopic.quiz.length - 1 ? 'Next Question →' : 'See Results →';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= currentTopic.quiz.length) showResults();
  else renderQuestion();
}

function showResults() {
  const total = currentTopic.quiz.length;
  const pct = Math.round((score / total) * 100);
  const elapsed = Math.round((Date.now() - startTime) / 1000);
  let emoji, title, sub;
  if (pct >= 90) { emoji = '🏆'; title = 'Outstanding!'; sub = 'You really know your stuff!'; }
  else if (pct >= 70) { emoji = '🎉'; title = 'Great Job!'; sub = 'Solid performance — keep it up!'; }
  else if (pct >= 50) { emoji = '💪'; title = 'Not Bad!'; sub = 'Room for improvement, but you\'re getting there.'; }
  else { emoji = '📖'; title = 'Keep Studying!'; sub = 'Review the material and try again.'; }
  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsSub').textContent = sub;
  document.getElementById('resultsScore').textContent = pct + '%';
  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resWrong').textContent = total - score;
  document.getElementById('resTime').textContent = elapsed + 's';
  showScreen('resultsScreen');
}

function retryQuiz() { if (currentTopic) startQuiz(currentTopic.id); }

  if (editingTopicId) {
    const t = topics.find(x => x.id === editingTopicId);
    document.getElementById('tmName').value = t.name;
    document.getElementById('tmDifficulty').value = t.difficulty;
    document.getElementById('tmProgress').value = t.progress;
    document.getElementById('tmQuestionCount').value = t.quiz.length;
    document.getElementById('tmQuestionCount').disabled = true;
    selectedIcon = t.icon;
    selectedColor = t.color;
  } else {
    document.getElementById('tmName').value = '';
    document.getElementById('tmDifficulty').value = 'Medium';
    document.getElementById('tmProgress').value = 0;
    document.getElementById('tmQuestionCount').value = 10;
    document.getElementById('tmQuestionCount').disabled = false;
    selectedIcon = '📚';
    selectedColor = '#7c5cfc';
  }

  document.getElementById('tmIcons').innerHTML = renderIconPalette(selectedIcon);
  document.getElementById('tmColors').innerHTML = renderColorPalette(selectedColor);
  modal.classList.add('open');
}

function closeTopicModal() {
  document.getElementById('topicModal').classList.remove('open');
}

function saveTopic() {
  const name = document.getElementById('tmName').value.trim();
  if (!name) { document.getElementById('tmName').focus(); return; }

  const difficulty = document.getElementById('tmDifficulty').value;
  const progress = parseInt(document.getElementById('tmProgress').value) || 0;

  if (editingTopicId) {
    const t = topics.find(x => x.id === editingTopicId);
    t.name = name;
    t.icon = selectedIcon;
    t.color = selectedColor;
    t.difficulty = difficulty;
    t.progress = Math.min(100, Math.max(0, progress));
  } else {
    const count = Math.max(1, parseInt(document.getElementById('tmQuestionCount').value) || 10);
    const newQuiz = [];
    for (let i = 0; i < count; i++) {
      newQuiz.push({ q: `Question ${i + 1}`, opts: ['Option A', 'Option B', 'Option C', 'Option D'], answer: 0, explain: '' });
    }
    topics.push({
      id: 'topic_' + (++topicIdCounter),
      name, icon: selectedIcon, color: selectedColor,
      questions: count, difficulty, progress: Math.min(100, Math.max(0, progress)),
      quiz: newQuiz
    });
  }

  closeTopicModal();
  renderTopics();
}

function confirmDeleteTopic(topicId) {
  const t = topics.find(x => x.id === topicId);
  document.getElementById('confirmTitle').textContent = 'Delete Topic?';
  document.getElementById('confirmMessage').textContent = `Are you sure you want to delete "${t.name}" and all its questions? This cannot be undone.`;
  document.getElementById('confirmAction').onclick = function() {
    topics = topics.filter(x => x.id !== topicId);
    closeConfirmModal();
    renderTopics();
  };
  document.getElementById('confirmModal').classList.add('open');
}

function closeConfirmModal() {
  document.getElementById('confirmModal').classList.remove('open');
}

// ── QUESTION MODAL ──
function openQuestionModal(topicId) {
  managingTopicId = topicId;
  const t = topics.find(x => x.id === topicId);
  document.getElementById('questionModalTitle').textContent = t.icon + ' ' + t.name + ' — Questions';
  renderQuestionList();
  document.getElementById('questionModal').classList.add('open');
}

function closeQuestionModal() {
  document.getElementById('questionModal').classList.remove('open');
  renderTopics();
}

function renderQuestionList() {
  const t = topics.find(x => x.id === managingTopicId);
  const container = document.getElementById('questionManagerContent');
  if (t.quiz.length === 0) {
    container.innerHTML = '<div class="empty-state">No questions yet. Add one to get started.</div>';
    return;
  }
  container.innerHTML = '<div class="question-list">' + t.quiz.map((q, i) => `
    <div class="question-item">
      <div class="question-item-num">${i + 1}</div>
      <div class="question-item-text">${q.q}</div>
      <div class="question-item-actions">
        <button class="qi-btn" onclick="editQuestion(${i})" title="Edit">✎</button>
        <button class="qi-btn delete" onclick="confirmDeleteQuestion(${i})" title="Delete">✕</button>
      </div>
    </div>
  `).join('') + '</div>';
}

function addQuestion() {
  editingQuestionIdx = null;
  document.getElementById('sqModalTitle').textContent = 'Add Question';
  document.getElementById('sqQuestion').value = '';
  document.getElementById('sqOptA').value = '';
  document.getElementById('sqOptB').value = '';
  document.getElementById('sqOptC').value = '';
  document.getElementById('sqOptD').value = '';
  document.getElementById('sqAnswer').value = '0';
  document.getElementById('sqExplain').value = '';
  document.getElementById('singleQuestionModal').classList.add('open');
}

function editQuestion(idx) {
  editingQuestionIdx = idx;
  const q = topics.find(x => x.id === managingTopicId).quiz[idx];
  document.getElementById('sqModalTitle').textContent = 'Edit Question';
  document.getElementById('sqQuestion').value = q.q;
  document.getElementById('sqOptA').value = q.opts[0] || '';
  document.getElementById('sqOptB').value = q.opts[1] || '';
  document.getElementById('sqOptC').value = q.opts[2] || '';
  document.getElementById('sqOptD').value = q.opts[3] || '';
  document.getElementById('sqAnswer').value = q.answer;
  document.getElementById('sqExplain').value = q.explain;
  document.getElementById('singleQuestionModal').classList.add('open');
}

function closeSingleQuestionModal() {
  document.getElementById('singleQuestionModal').classList.remove('open');
}

function saveSingleQuestion() {
  const qText = document.getElementById('sqQuestion').value.trim();
  if (!qText) { document.getElementById('sqQuestion').focus(); return; }

  const qObj = {
    q: qText,
    opts: [
      document.getElementById('sqOptA').value.trim() || 'Option A',
      document.getElementById('sqOptB').value.trim() || 'Option B',
      document.getElementById('sqOptC').value.trim() || 'Option C',
      document.getElementById('sqOptD').value.trim() || 'Option D',
    ],
    answer: parseInt(document.getElementById('sqAnswer').value),
    explain: document.getElementById('sqExplain').value.trim()
  };

  const t = topics.find(x => x.id === managingTopicId);
  if (editingQuestionIdx !== null) {
    t.quiz[editingQuestionIdx] = qObj;
  } else {
    t.quiz.push(qObj);
  }

  closeSingleQuestionModal();
  renderQuestionList();
}

function confirmDeleteQuestion(idx) {
  const q = topics.find(x => x.id === managingTopicId).quiz[idx];
  document.getElementById('confirmTitle').textContent = 'Delete Question?';
  document.getElementById('confirmMessage').textContent = `Delete "${q.q.substring(0, 60)}${q.q.length > 60 ? '…' : ''}"?`;
  document.getElementById('confirmAction').onclick = function() {
    const t = topics.find(x => x.id === managingTopicId);
    t.quiz.splice(idx, 1);
    closeConfirmModal();
    renderQuestionList();
  };
  document.getElementById('confirmModal').classList.add('open');
}

// ── INIT ──
renderTopics();
</script>
</body>
</html>
