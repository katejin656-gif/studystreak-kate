<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyStreak by Kate</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --card-hover: #22222e;
    --accent: #7c5cfc;
    --accent-glow: rgba(124, 92, 252, 0.25);
    --green: #34d399;
    --red: #f87171;
    --orange: #fb923c;
    --yellow: #facc15;
    --text: #e8e8ed;
    --text-dim: #8888a0;
    --border: #2a2a38;
    --radius: 16px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app { max-width: 640px; margin: 0 auto; padding: 20px 16px 100px; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 24px; background: #000; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), #a78bfa); border-radius: 12px; display: grid; place-items: center; font-size: 20px; }
  .streak-badge { display: flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border); padding: 8px 14px; border-radius: 40px; font-weight: 600; font-size: 14px; }
  .streak-badge .fire { font-size: 18px; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 14px; text-align: center; }
  .stat-card .value { font-size: 26px; font-weight: 800; margin-bottom: 2px; }
  .stat-card .label { font-size: 12px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  .topics-grid { display: grid; gap: 10px; margin-bottom: 32px; }
  .topic-card { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .topic-card:hover { background: var(--card-hover); border-color: var(--accent); transform: translateY(-1px); }
  .topic-card:hover .topic-actions { opacity: 1; pointer-events: all; }
  .topic-icon { width: 50px; height: 50px; border-radius: 14px; display: grid; place-items: center; font-size: 26px; flex-shrink: 0; }
  .topic-info { flex: 1; }
  .topic-name { font-weight: 700; font-size: 16px; margin-bottom: 3px; }
  .topic-meta { font-size: 13px; color: var(--text-dim); }
  .topic-progress-wrap { width: 100%; height: 5px; background: rgba(255,255,255,0.06); border-radius: 99px; margin-top: 8px; overflow: hidden; }
  .topic-progress-bar { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .topic-arrow { color: var(--text-dim); font-size: 20px; flex-shrink: 0; }
  .topic-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .topic-action-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text-dim); font-size: 14px; cursor: pointer; display: grid; place-items: center; transition: all 0.15s; }
  .topic-action-btn:hover { border-color: var(--accent); color: var(--text); }
  .topic-action-btn.delete:hover { border-color: var(--red); color: var(--red); }

  .add-topic-btn { width: 100%; padding: 16px; border-radius: var(--radius); border: 2px dashed var(--border); background: transparent; color: var(--text-dim); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 32px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .add-topic-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,92,252,0.05); }

  .screen { display: none; }
  .screen.active { display: block; }

  .back-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 24px; transition: background 0.2s; }
  .back-btn:hover { background: var(--card-hover); }

  .quiz-header { text-align: center; margin-bottom: 24px; }
  .quiz-topic-label { font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .quiz-progress { display: flex; gap: 4px; justify-content: center; margin-top: 14px; }
  .quiz-dot { width: 32px; height: 5px; border-radius: 99px; background: var(--border); transition: background 0.3s; }
  .quiz-dot.done { background: var(--green); }
  .quiz-dot.current { background: var(--accent); }
  .quiz-dot.wrong { background: var(--red); }

  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 22px; margin-bottom: 16px; text-align: center; }
  .question-number { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; font-weight: 500; }
  .question-text { font-size: 20px; font-weight: 700; line-height: 1.4; }

  .options { display: grid; gap: 10px; margin-bottom: 20px; }
  .option-btn { width: 100%; text-align: left; padding: 16px 20px; background: var(--card); border: 2px solid var(--border); border-radius: 14px; color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
  .option-btn:hover:not(.disabled) { border-color: var(--accent); background: var(--card-hover); }
  .option-btn .letter { width: 32px; height: 32px; border-radius: 10px; background: rgba(255,255,255,0.05); display: grid; place-items: center; font-size: 13px; font-weight: 700; flex-shrink: 0; color: var(--text-dim); }
  .option-btn.correct { border-color: var(--green); background: rgba(52, 211, 153, 0.1); }
  .option-btn.correct .letter { background: var(--green); color: #000; }
  .option-btn.wrong { border-color: var(--red); background: rgba(248, 113, 113, 0.1); }
  .option-btn.wrong .letter { background: var(--red); color: #000; }
  .option-btn.disabled { pointer-events: none; opacity: 0.5; }

  .explanation { background: rgba(124, 92, 252, 0.08); border: 1px solid rgba(124, 92, 252, 0.2); border-radius: 14px; padding: 16px 20px; margin-bottom: 16px; font-size: 14px; line-height: 1.6; color: #c4b5fd; display: none; }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  .next-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), #6d4de8); border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s; display: none; }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px var(--accent-glow); }

  .results-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 24px; text-align: center; margin-bottom: 24px; }
  .results-emoji { font-size: 64px; margin-bottom: 16px; }
  .results-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .results-sub { color: var(--text-dim); font-size: 15px; margin-bottom: 24px; }
  .results-score { font-size: 56px; font-weight: 800; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
  .results-label { font-size: 14px; color: var(--text-dim); font-weight: 500; }
  .results-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
  .results-stat .val { font-size: 22px; font-weight: 800; }
  .results-stat .lbl { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .action-btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; transition: transform 0.15s; margin-bottom: 10px; }
  .action-btn:hover { transform: translateY(-1px); }
  .action-primary { background: linear-gradient(135deg, var(--accent), #6d4de8); color: #fff; }
  .action-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  .btn-danger { background: var(--red); color: #fff; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .modal-close { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 18px; cursor: pointer; display: grid; place-items: center; }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 12px 16px; background: var(--bg); border: 2px solid var(--border); border-radius: 12px; color: var(--text); font-family: inherit; font-size: 15px; font-weight: 500; transition: border-color 0.2s; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch { width: 32px; height: 32px; border-radius: 10px; border: 3px solid transparent; cursor: pointer; transition: all 0.15s; }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); }
  .icon-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .icon-pick { width: 40px; height: 40px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg); font-size: 20px; cursor: pointer; display: grid; place-items: center; transition: all 0.15s; }
  .icon-pick:hover { border-color: var(--accent); }
  .icon-pick.selected { border-color: var(--accent); background: rgba(124,92,252,0.1); }

  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn-row .action-btn { margin-bottom: 0; flex: 1; }

  .question-list { display: grid; gap: 8px; margin-bottom: 16px; }
  .question-item { display: flex; align-items: center; gap: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; transition: border-color 0.2s; }
  .question-item:hover { border-color: var(--accent); }
  .question-item-num { width: 28px; height: 28px; border-radius: 8px; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; display: grid; place-items: center; flex-shrink: 0; }
  .question-item-text { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .question-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .qi-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 12px; cursor: pointer; display: grid; place-items: center; }
  .qi-btn:hover { border-color: var(--accent); color: var(--text); }
  .qi-btn.delete:hover { border-color: var(--red); color: var(--red); }
  .empty-state { text-align: center; padding: 32px 16px; color: var(--text-dim); font-size: 14px; }

  /* ── AI CHAT WIDGET ── */
  .chat-fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #a78bfa); border: none; color: #fff; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px var(--accent-glow); z-index: 900; transition: transform 0.2s; display: grid; place-items: center; }
  .chat-fab:hover { transform: scale(1.1); }
  .chat-panel { display: none; position: fixed; bottom: 92px; right: 24px; width: 380px; max-width: calc(100vw - 48px); height: 520px; max-height: 70vh; background: var(--card); border: 1px solid var(--border); border-radius: 20px; z-index: 901; flex-direction: column; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
  .chat-panel.open { display: flex; }
  .chat-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .chat-header-title { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .chat-header-close { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; }
  .chat-topic-select { padding: 10px 18px; border-bottom: 1px solid var(--border); }
  .chat-topic-select select { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
  .chat-msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.ai { align-self: flex-start; background: var(--bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .chat-msg.ai.loading { color: var(--text-dim); font-style: italic; }
  .chat-input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .chat-input-row input { flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 14px; }
  .chat-input-row input:focus { outline: none; border-color: var(--accent); }
  .chat-send-btn { padding: 10px 16px; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity 0.15s; }
  .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── AI EXPLANATIONS ── */
  .ai-explain-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; }
  .ai-explain-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ai-explain-q { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
  .ai-explain-answers { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; }
  .ai-explain-answers span.correct-label { color: var(--green); font-weight: 600; }
  .ai-explain-answers span.wrong-label { color: var(--red); text-decoration: line-through; }
  .ai-explain-text { font-size: 13px; line-height: 1.6; color: #c4b5fd; padding: 10px 14px; background: rgba(124,92,252,0.06); border-radius: 10px; }
  .ai-explain-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .ai-explain-btn:hover { background: rgba(124,92,252,0.1); }
  .ai-explain-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── AI GENERATE BUTTON ── */
  .ai-generate-bar { display: flex; gap: 8px; align-items: center; padding: 12px 0; border-top: 1px solid var(--border); margin-top: 12px; }
  .ai-generate-bar input { flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 13px; }
  .ai-generate-bar input:focus { outline: none; border-color: var(--accent); }
  .ai-gen-btn { padding: 10px 16px; background: linear-gradient(135deg, var(--accent), #a78bfa); border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
  .ai-gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .ai-gen-status { font-size: 12px; color: var(--text-dim); padding: 4px 0; }

  .loading-screen { display: flex; justify-content: center; align-items: center; min-height: 60vh; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .animate { animation: fadeUp 0.35s ease both; }
  .delay-1 { animation-delay: 0.05s; }
  .delay-2 { animation-delay: 0.1s; }
  .delay-3 { animation-delay: 0.15s; }
  .delay-4 { animation-delay: 0.2s; }

  @media (max-width: 420px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .stat-card { padding: 12px 8px; }
    .stat-card .value { font-size: 20px; }
    .question-text { font-size: 17px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div id="homeScreen" class="screen active">
    <div class="header animate">
      <div class="logo"><div class="logo-icon">📚</div> StudyStreak</div>
      <div class="streak-badge"><span class="fire">🔥</span> <span id="streakCount">7</span> day streak</div>
    </div>
    <div class="stats-row">
      <div class="stat-card animate delay-1">
        <div class="value" style="color:var(--accent)" id="statQuestions">...</div>
        <div class="label">Questions</div>
      </div>
      <div class="stat-card animate delay-2">
        <div class="value" style="color:var(--green)" id="statAccuracy">86%</div>
        <div class="label">Accuracy</div>
      </div>
      <div class="stat-card animate delay-3">
        <div class="value" style="color:var(--orange)" id="statTopics">...</div>
        <div class="label">Topics</div>
      </div>
    </div>
    <div class="section-title animate delay-2">📖 Study Topics</div>
    <div class="topics-grid" id="topicsList">
      <div class="loading-screen"><div class="spinner"></div></div>
    </div>
    <button class="add-topic-btn" onclick="openTopicModal()">+ Add Topic</button>
  </div>

  <!-- QUIZ -->
  <div id="quizScreen" class="screen">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="quiz-header">
      <div class="quiz-topic-label" id="quizTopicLabel"></div>
      <div class="question-card">
        <div class="question-number" id="questionNumber"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div class="quiz-progress" id="quizProgress"></div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>

  <!-- RESULTS -->
  <div id="resultsScreen" class="screen">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="results-card animate">
      <div class="results-emoji" id="resultsEmoji"></div>
      <div class="results-title" id="resultsTitle"></div>
      <div class="results-sub" id="resultsSub"></div>
      <div class="results-score" id="resultsScore"></div>
      <div class="results-label">correct answers</div>
      <div class="results-stats">
        <div class="results-stat"><div class="val" id="resCorrect" style="color:var(--green)">0</div><div class="lbl">Correct</div></div>
        <div class="results-stat"><div class="val" id="resWrong" style="color:var(--red)">0</div><div class="lbl">Wrong</div></div>
        <div class="results-stat"><div class="val" id="resTime" style="color:var(--orange)">0s</div><div class="lbl">Time</div></div>
      </div>
    </div>
    <button class="action-btn action-primary" onclick="retryQuiz()">Try Again</button>
    <button class="action-btn action-secondary" onclick="goHome()">Back to Topics</button>
    <div id="aiExplanations"></div>
  </div>
</div>

<!-- AI CHAT WIDGET -->
<button class="chat-fab" id="chatFab" onclick="toggleChat()">🤖</button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div class="chat-header-title">🤖 AI Study Tutor</div>
    <button class="chat-header-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-topic-select">
    <select id="chatTopicSelect"><option value="">General Knowledge</option></select>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg ai">Hi! I'm your AI study tutor. Ask me anything about your study topics!</div>
  </div>
  <div class="chat-input-row">
    <input id="chatInput" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')sendChat()" />
    <button class="chat-send-btn" id="chatSendBtn" onclick="sendChat()">Send</button>
  </div>
</div>

<!-- TOPIC MODAL -->
<div class="modal-overlay" id="topicModal">
  <div class="modal">
    <div class="modal-title">
      <span id="topicModalTitle">Add Topic</span>
      <button class="modal-close" onclick="closeTopicModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Topic Name</label>
      <input class="form-input" id="tmName" placeholder="e.g. Chemistry" />
    </div>
    <div class="form-group">
      <label class="form-label">Icon</label>
      <div class="icon-options" id="tmIcons"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-options" id="tmColors"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Difficulty</label>

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

const iconPalette = ['📐','🧬','🇪🇸','🏛️','⚛️','🧪','📈','🌍','🎨','📝','🧠','💡','🎵','📊','💻','🔬','📚','🌱','🏆','⚽'];
const colorPalette = ['#7c5cfc','#34d399','#fb923c','#facc15','#f87171','#a78bfa','#38bdf8','#f472b6','#fbbf24','#60a5fa','#4ade80','#e879f9'];

function renderIconPalette(sel) {

async function loadData() {
  const { data: topics } = await supabase.from('topics').select('*').order('created_at');
  const { data: questions } = await supabase.from('questions').select('*').order('position');

}

function getQuestionsForTopic(topicId) {
  return allQuestions.filter(q => q.topic_id === topicId).sort((a, b) => a.position - b.position);
}

function renderTopics() {
  const list = document.getElementById('topicsList');

    const qCount = getQuestionsForTopic(t.id).length;

    <div class="topic-card animate delay-${i % 4 + 1}" onclick="window.startQuiz('${t.id}')">

}

function showScreen(id) {

}
window.goHome = function() { showScreen('homeScreen'); };

// ── QUIZ ──
window.startQuiz = async function(topicId) {
  currentTopic = allTopics.find(t => t.id === topicId);
  const qs = getQuestionsForTopic(topicId);
  if (!currentTopic || qs.length === 0) return;
  currentTopic._quiz = qs;
  currentQ = 0; score = 0; answered = false; startTime = Date.now();
  quizResults = new Array(qs.length).fill(null);
  document.getElementById('quizTopicLabel').textContent = currentTopic.icon + ' ' + currentTopic.name;
  showScreen('quizScreen');
  renderQuestion();
};

function renderQuestion() {
  const qs = currentTopic._quiz;
  const q = qs[currentQ];
  answered = false;
  document.getElementById('questionNumber').textContent = `Question ${currentQ + 1} of ${qs.length}`;
  document.getElementById('questionText').textContent = q.question_text;
  const prog = document.getElementById('quizProgress');
  prog.innerHTML = qs.map((_, i) => {
    let cls = 'quiz-dot';
    if (i < currentQ) cls += quizResults[i] ? ' done' : ' wrong';
    else if (i === currentQ) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  const letters = ['A','B','C','D'];
  const opts = q.opts || q.options;
  document.getElementById('optionsContainer').innerHTML = opts.map((opt, i) =>
    `<button class="option-btn" onclick="window.selectAnswer(${i})"><span class="letter">${letters[i]}</span>${opt}</button>`
  ).join('');
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

window.selectAnswer = function(idx) {
  if (answered) return;
  answered = true;
  const q = currentTopic._quiz[currentQ];
  const correct = idx === q.answer;
  if (correct) score++;
  quizResults[currentQ] = correct;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
    else btn.classList.add('disabled');
  });
  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Incorrect'}</strong> ${q.explanation}`;
  exp.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('nextBtn').textContent = currentQ < currentTopic._quiz.length - 1 ? 'Next Question →' : 'See Results →';
};

window.nextQuestion = function() {
  currentQ++;
  if (currentQ >= currentTopic._quiz.length) showResults();
  else renderQuestion();
};

function showResults() {
  const total = currentTopic._quiz.length;
  const pct = Math.round((score / total) * 100);
  const elapsed = Math.round((Date.now() - startTime) / 1000);
  let emoji, title, sub;
  if (pct >= 90) { emoji = '🏆'; title = 'Outstanding!'; sub = 'You really know your stuff!'; }
  else if (pct >= 70) { emoji = '🎉'; title = 'Great Job!'; sub = 'Solid performance — keep it up!'; }
  else if (pct >= 50) { emoji = '💪'; title = 'Not Bad!'; sub = 'Room for improvement, but you\'re getting there.'; }
  else { emoji = '📖'; title = 'Keep Studying!'; sub = 'Review the material and try again.'; }
  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsSub').textContent = sub;
  document.getElementById('resultsScore').textContent = pct + '%';
  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resWrong').textContent = total - score;
  document.getElementById('resTime').textContent = elapsed + 's';
  showScreen('resultsScreen');
  renderAIExplanations();
}

window.retryQuiz = function() { if (currentTopic) window.startQuiz(currentTopic.id); };

// ── TOPIC CRUD ──

window.closeTopicModal = function() { document.getElementById('topicModal').classList.remove('open'); };

window.saveTopic = async function() {
  const name = document.getElementById('tmName').value.trim();
  if (!name) { document.getElementById('tmName').focus(); return; }
  const difficulty = document.getElementById('tmDifficulty').value;
  const progress = Math.min(100, Math.max(0, parseInt(document.getElementById('tmProgress').value) || 0));

  if (editingTopicId) {
    await supabase.from('topics').update({ name, icon: selectedIcon, color: selectedColor, difficulty, progress }).eq('id', editingTopicId);
  } else {
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') + '_' + Date.now();
    await supabase.from('topics').insert({ id, name, icon: selectedIcon, color: selectedColor, difficulty, progress });
  }
  closeTopicModal();
  await loadData();
};

window.confirmDeleteTopic = function(topicId) {

  if (qId) {
    const q = allQuestions.find(x => x.id === qId);

window.saveSingleQuestion = async function() {
  const qText = document.getElementById('sqQuestion').value.trim();
  if (!qText) { document.getElementById('sqQuestion').focus(); return; }
  const opts = [
    document.getElementById('sqOptA').value.trim() || 'Option A',
    document.getElementById('sqOptB').value.trim() || 'Option B',
    document.getElementById('sqOptC').value.trim() || 'Option C',
    document.getElementById('sqOptD').value.trim() || 'Option D',
  ];

// ── AI: EXPLANATIONS ──
async function getAIExplanation(qIdx) {
  const q = currentTopic._quiz[qIdx];
  const wasCorrect = quizResults[qIdx];
  const opts = q.opts || q.options;
  const userAnswerIdx = wasCorrect ? q.answer : -1;

  const btn = document.getElementById('aiExBtn_' + qIdx);
  if (btn) { btn.disabled = true; btn.textContent = 'Thinking...'; }

  try {
    const res = await fetch('/api/explain', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: q.question_text,
        userAnswer: userAnswerIdx >= 0 ? opts[userAnswerIdx] : '(skipped)',
        correctAnswer: opts[q.answer],
        topic: currentTopic.name
      })
    });
    const data = await res.json();
    const card = document.getElementById('aiExCard_' + qIdx);
    if (card) {
      const textEl = card.querySelector('.ai-explain-text');
      if (textEl) textEl.textContent = data.explanation || 'Could not generate explanation.';
    }
  } catch (e) {
    const card = document.getElementById('aiExCard_' + qIdx);
    if (card) {
      const textEl = card.querySelector('.ai-explain-text');
      if (textEl) textEl.textContent = 'Error: ' + e.message;
    }
  }
}

function renderAIExplanations() {
  const container = document.getElementById('aiExplanations');
  const wrongQs = [];
  currentTopic._quiz.forEach((q, i) => {
    if (!quizResults[i]) wrongQs.push({ q, idx: i });
  });

  if (wrongQs.length === 0) {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = `
    <div style="margin-top:24px;margin-bottom:8px">
      <div class="section-title">🤖 AI Explanations</div>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:14px">Get personalized AI explanations for the questions you missed.</p>
    </div>
    ${wrongQs.map(({ q, idx }) => {
      const opts = q.opts || q.options;
      return `
      <div class="ai-explain-card" id="aiExCard_${idx}">
        <div class="ai-explain-header">
          <span style="font-size:12px;color:var(--red);font-weight:600">Question ${idx + 1}</span>
          <button class="ai-explain-btn" id="aiExBtn_${idx}" onclick="getAIExplanation(${idx})">Get AI Explanation</button>
        </div>
        <div class="ai-explain-q">${q.question_text}</div>
        <div class="ai-explain-answers">
          Correct: <span class="correct-label">${opts[q.answer]}</span>
        </div>
        <div class="ai-explain-text" style="display:none"></div>
      </div>`;
    }).join('')}
  `;
}

// Show/hide explanation text when loaded
const _origGetAI = getAIExplanation;
window.getAIExplanation = async function(idx) {
  await _origGetAI(idx);
  const card = document.getElementById('aiExCard_' + idx);
  if (card) {
    const textEl = card.querySelector('.ai-explain-text');
    if (textEl) textEl.style.display = 'block';
  }
};

// ── AI: CHAT ──
let chatHistory = [];
let chatOpen = false;

window.toggleChat = function() {
  chatOpen = !chatOpen;
  document.getElementById('chatPanel').classList.toggle('open', chatOpen);
  if (chatOpen) document.getElementById('chatInput').focus();
};

function populateChatTopics() {
  const sel = document.getElementById('chatTopicSelect');
  sel.innerHTML = '<option value="">General Knowledge</option>' +
    allTopics.map(t => `<option value="${t.name}">${t.icon} ${t.name}</option>`).join('');
}

window.sendChat = async function() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const messagesEl = document.getElementById('chatMessages');
  messagesEl.innerHTML += `<div class="chat-msg user">${msg}</div>`;

  const topic = document.getElementById('chatTopicSelect').value;
  chatHistory.push({ role: 'user', content: msg });

  const loadingId = 'loading_' + Date.now();
  messagesEl.innerHTML += `<div class="chat-msg ai loading" id="${loadingId}">Thinking...</div>`;
  messagesEl.scrollTop = messagesEl.scrollHeight;

  document.getElementById('chatSendBtn').disabled = true;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, topic, history: chatHistory.slice(-10) })
    });
    const data = await res.json();
    const reply = data.reply || 'Sorry, I had trouble answering that.';

    chatHistory.push({ role: 'assistant', content: reply });
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) {
      loadingEl.textContent = reply;
      loadingEl.classList.remove('loading');
    }
  } catch (e) {
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) {
      loadingEl.textContent = 'Error: ' + e.message;
      loadingEl.classList.remove('loading');
    }
  }

  document.getElementById('chatSendBtn').disabled = false;
  messagesEl.scrollTop = messagesEl.scrollHeight;
};

// ── AI: QUESTION GENERATOR ──
window.generateQuestions = async function() {
  if (!managingTopicId) return;
  const t = allTopics.find(x => x.id === managingTopicId);
  const count = parseInt(document.getElementById('aiGenCount').value) || 5;
  const btn = document.getElementById('aiGenBtn');
  const status = document.getElementById('aiGenStatus');

  btn.disabled = true;
  btn.textContent = 'Generating...';
  status.textContent = `Asking AI to generate ${count} questions about ${t.name}...`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: t.name, count, difficulty: t.difficulty })
    });
    const data = await res.json();

    if (!data.questions || !Array.isArray(data.questions)) {
      throw new Error(data.error || 'Invalid response');
    }

    const existingQs = getQuestionsForTopic(managingTopicId);
    let inserted = 0;
    for (const q of data.questions) {
      if (!q.q || !q.opts) continue;
      await supabase.from('questions').insert({
        topic_id: managingTopicId,
        position: existingQs.length + inserted,
        question_text: q.q,
        options: q.opts,
        answer: q.answer || 0,
        explanation: q.explain || ''
      });
      inserted++;
    }

    status.textContent = `✓ Generated ${inserted} questions!`;
    await loadData();
    renderQuestionList();
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '🤖 Generate with AI';
};

// ── INIT ──
await loadData();
populateChatTopics();
</script>
</body>
</html>
