<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyStreak by Kate</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --card-hover: #22222e;
    --accent: #7c5cfc;
    --accent-glow: rgba(124, 92, 252, 0.25);
    --green: #34d399;
    --red: #f87171;
    --orange: #fb923c;
    --yellow: #facc15;
    --text: #e8e8ed;
    --text-dim: #8888a0;
    --border: #2a2a38;
    --radius: 16px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 24px;
    background: #000000;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 12px;
    display: grid;
    place-items: center;
    font-size: 20px;
  }
  .streak-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 14px;
  }
  .streak-badge .fire { font-size: 18px; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px;
    text-align: center;
  }
  .stat-card .value {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 2px;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── SECTION TITLES ── */
  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── TOPIC CARDS ── */
  .topics-grid {
    display: grid;
    gap: 10px;
    margin-bottom: 32px;
  }
  .topic-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .topic-card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .topic-icon {
    width: 50px; height: 50px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .topic-info { flex: 1; }
  .topic-name { font-weight: 700; font-size: 16px; margin-bottom: 3px; }
  .topic-meta { font-size: 13px; color: var(--text-dim); }
  .topic-progress-wrap {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    margin-top: 8px;
    overflow: hidden;
  }
  .topic-progress-bar {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    transition: width 0.6s ease;
  }
  .topic-arrow {
    color: var(--text-dim);
    font-size: 20px;
    flex-shrink: 0;
  }

  /* ── QUIZ SCREEN ── */
  .screen { display: none; }
  .screen.active { display: block; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 24px;
    transition: background 0.2s;
  }
  .back-btn:hover { background: var(--card-hover); }

  .quiz-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .quiz-topic-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .quiz-progress {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-top: 14px;
  }
  .quiz-dot {
    width: 32px; height: 5px;
    border-radius: 99px;
    background: var(--border);
    transition: background 0.3s;
  }
  .quiz-dot.done { background: var(--green); }
  .quiz-dot.current { background: var(--accent); }
  .quiz-dot.wrong { background: var(--red); }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 22px;
    margin-bottom: 16px;
    text-align: center;
  }
  .question-number {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .question-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
  }

  .options {
    display: grid;
    gap: 10px;
    margin-bottom: 20px;
  }
  .option-btn {
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-btn:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--card-hover);
  }
  .option-btn .letter {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    display: grid;
    place-items: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--text-dim);
  }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(52, 211, 153, 0.1);
  }
  .option-btn.correct .letter {
    background: var(--green);
    color: #000;
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(248, 113, 113, 0.1);
  }
  .option-btn.wrong .letter {
    background: var(--red);
    color: #000;
  }
  .option-btn.disabled { pointer-events: none; opacity: 0.5; }

  .explanation {
    background: rgba(124, 92, 252, 0.08);
    border: 1px solid rgba(124, 92, 252, 0.2);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: #c4b5fd;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  .next-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #6d4de8);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px var(--accent-glow);
  }

  /* ── RESULTS SCREEN ── */
  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 24px;
    text-align: center;
    margin-bottom: 24px;
  }
  .results-emoji { font-size: 64px; margin-bottom: 16px; }
  .results-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .results-sub { color: var(--text-dim); font-size: 15px; margin-bottom: 24px; }
  .results-score {
    font-size: 56px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .results-label { font-size: 14px; color: var(--text-dim); font-weight: 500; }
  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .results-stat .val { font-size: 22px; font-weight: 800; }
  .results-stat .lbl { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .action-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: transform 0.15s;
    margin-bottom: 10px;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .action-primary {
    background: linear-gradient(135deg, var(--accent), #6d4de8);
    color: #fff;
  }
  .action-secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate { animation: fadeUp 0.35s ease both; }
  .delay-1 { animation-delay: 0.05s; }
  .delay-2 { animation-delay: 0.1s; }
  .delay-3 { animation-delay: 0.15s; }
  .delay-4 { animation-delay: 0.2s; }

  /* ── RESPONSIVE ── */
  @media (max-width: 420px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .stat-card { padding: 12px 8px; }
    .stat-card .value { font-size: 20px; }
    .question-text { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ===== HOME SCREEN ===== -->
  <div id="homeScreen" class="screen active">
    <div class="header animate">
      <div class="logo">
        <div class="logo-icon">📚</div>
        StudyStreak
      </div>
      <div class="streak-badge">
        <span class="fire">🔥</span>
        <span id="streakCount">7</span> day streak
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card animate delay-1">
        <div class="value" style="color:var(--accent)">273</div>
        <div class="label">Questions</div>
      </div>
      <div class="stat-card animate delay-2">
        <div class="value" style="color:var(--green)">86%</div>
        <div class="label">Accuracy</div>
      </div>
      <div class="stat-card animate delay-3">
        <div class="value" style="color:var(--orange)">13</div>
        <div class="label">Quizzes</div>
      </div>
    </div>

    <div class="section-title animate delay-2">📖 Study Topics</div>
    <div class="topics-grid" id="topicsList"></div>
  </div>

  <!-- ===== QUIZ SCREEN ===== -->
  <div id="quizScreen" class="screen">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="quiz-header">
      <div class="quiz-topic-label" id="quizTopicLabel"></div>
      <div class="question-card">
        <div class="question-number" id="questionNumber"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div class="quiz-progress" id="quizProgress"></div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>

  <!-- ===== RESULTS SCREEN ===== -->
  <div id="resultsScreen" class="screen">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="results-card animate">
      <div class="results-emoji" id="resultsEmoji"></div>
      <div class="results-title" id="resultsTitle"></div>
      <div class="results-sub" id="resultsSub"></div>
      <div class="results-score" id="resultsScore"></div>
      <div class="results-label">correct answers</div>
      <div class="results-stats">
        <div class="results-stat">
          <div class="val" id="resCorrect" style="color:var(--green)">0</div>
          <div class="lbl">Correct</div>
        </div>
        <div class="results-stat">
          <div class="val" id="resWrong" style="color:var(--red)">0</div>
          <div class="lbl">Wrong</div>
        </div>
        <div class="results-stat">
          <div class="val" id="resTime" style="color:var(--orange)">0s</div>
          <div class="lbl">Time</div>
        </div>
      </div>
    </div>
    <button class="action-btn action-primary" onclick="retryQuiz()">Try Again</button>
    <button class="action-btn action-secondary" onclick="goHome()">Back to Topics</button>
  </div>
</div>

// ── STATE ──
let currentTopic = null;
let currentQ = 0;
let score = 0;
let answered = false;
let startTime = 0;
let quizResults = [];

// ── RENDER TOPICS ──
function renderTopics() {
  const list = document.getElementById('topicsList');
  list.innerHTML = topics.map((t, i) => `
    <div class="topic-card animate delay-${i % 4 + 1}" onclick="startQuiz('${t.id}')">
      <div class="topic-icon" style="background:${t.color}22">${t.icon}</div>
      <div class="topic-info">
        <div class="topic-name">${t.name}</div>
        <div class="topic-meta">${t.questions} questions · ${t.difficulty}</div>
        <div class="topic-progress-wrap">
          <div class="topic-progress-bar" style="width:${t.progress}%; background:linear-gradient(90deg, ${t.color}, ${t.color}88)"></div>
        </div>
      </div>
      <div class="topic-arrow">›</div>
    </div>
  `).join('');
}

// ── SCREEN MANAGEMENT ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showScreen('homeScreen');
}

// ── QUIZ LOGIC ──
function startQuiz(topicId) {
  currentTopic = topics.find(t => t.id === topicId);
  currentQ = 0;
  score = 0;
  answered = false;
  startTime = Date.now();
  quizResults = new Array(currentTopic.quiz.length).fill(null);

  document.getElementById('quizTopicLabel').textContent = currentTopic.icon + ' ' + currentTopic.name;
  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  const quiz = currentTopic.quiz;
  const q = quiz[currentQ];
  answered = false;

  document.getElementById('questionNumber').textContent = `Question ${currentQ + 1} of ${quiz.length}`;
  document.getElementById('questionText').textContent = q.q;

  // progress dots
  const prog = document.getElementById('quizProgress');
  prog.innerHTML = quiz.map((_, i) => {
    let cls = 'quiz-dot';
    if (i < currentQ) cls += quizResults[i] ? ' done' : ' wrong';
    else if (i === currentQ) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');

  // options
  const letters = ['A', 'B', 'C', 'D'];
  document.getElementById('optionsContainer').innerHTML = q.opts.map((opt, i) => `
    <button class="option-btn" onclick="selectAnswer(${i})">
      <span class="letter">${letters[i]}</span>
      ${opt}
    </button>
  `).join('');

  document.getElementById('explanation').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = currentTopic.quiz[currentQ];
  const correct = idx === q.answer;
  if (correct) score++;
  quizResults[currentQ] = correct;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
    else btn.classList.add('disabled');
  });

  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Incorrect'}</strong> ${q.explain}`;
  exp.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('nextBtn').textContent =
    currentQ < currentTopic.quiz.length - 1 ? 'Next Question →' : 'See Results →';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= currentTopic.quiz.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  const total = currentTopic.quiz.length;
  const pct = Math.round((score / total) * 100);
  const elapsed = Math.round((Date.now() - startTime) / 1000);

  let emoji, title, sub;
  if (pct >= 90) { emoji = '🏆'; title = 'Outstanding!'; sub = 'You really know your stuff!'; }
  else if (pct >= 70) { emoji = '🎉'; title = 'Great Job!'; sub = 'Solid performance — keep it up!'; }
  else if (pct >= 50) { emoji = '💪'; title = 'Not Bad!'; sub = 'Room for improvement, but you\'re getting there.'; }
  else { emoji = '📖'; title = 'Keep Studying!'; sub = 'Review the material and try again.'; }

  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsSub').textContent = sub;
  document.getElementById('resultsScore').textContent = pct + '%';
  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resWrong').textContent = total - score;
  document.getElementById('resTime').textContent = elapsed + 's';

  showScreen('resultsScreen');
}

function retryQuiz() {
  if (currentTopic) startQuiz(currentTopic.id);
}

// ── INIT ──
renderTopics();
</script>
